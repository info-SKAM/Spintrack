services:
  # ── Backend: FastAPI (Render) ─────────────────────────────────────────────
  - type: web
    name: spintrack-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Set in Render dashboard — your Neon PostgreSQL URL
      - key: FRONTEND_ORIGIN
        sync: false          # Set to your Vercel frontend URL, e.g. https://spintrack.vercel.app
